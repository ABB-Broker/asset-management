<!doctype html>
<html>
  <body
    style="
      font-family: sans-serif;
      background: #f1f5f9;
      margin: 0;
      padding: 32px;
    "
  >
    <div
      style="
        max-width: 520px;
        margin: auto;
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      "
    >
      <div style="background: #0f172a; padding: 28px 32px">
        <h2 style="color: #fff; margin: 0; font-size: 1.2rem">{{.Heading}}</h2>
      </div>

      <div style="padding: 28px 32px">
        <p>{{.Greeting}}</p>

        <p>{{.Body}}</p>

        <div style="text-align: center; margin: 28px 0">
          <a
            href="{{.Link}}"
            style="
              background: #2563eb;
              color: #fff;
              padding: 12px 28px;
              border-radius: 6px;
              text-decoration: none;
              font-weight: 600;
              display: inline-block;
            "
          >
            {{.ButtonText}}
          </a>
        </div>

        <p style="color: #64748b; font-size: 0.85rem">
          Or copy this link:
          <br />
          <a href="{{.Link}}" style="color: #2563eb"> {{.Link}} </a>
        </p>
      </div>
    </div>
  </body>
</html>
