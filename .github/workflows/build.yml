name: Build and Test

on:
  push:
    branches:
      - dev
      - master
    paths:
      - '**.go'
      - go.mod
      - go.sum
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - dev
      - master
    paths:
      - '**.go'
      - go.mod
      - go.sum
      - '.github/workflows/build.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', '1.25']
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Install dependencies
        run: go mod tidy

      - name: Build
        run: go build ./...

      - name: Check import formatting (goimports)
        if: runner.os == 'Linux'
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          unformatted=$(goimports -l $(find . -name '*.go' -not -path './vendor/*' -not -path './docs/*'))
          if [ -n "$unformatted" ]; then
            echo "The following files have unformatted imports (run 'goimports -w .'):"
            echo "$unformatted"
            exit 1
          fi

      - name: Check code formatting (gofmt)
        if: runner.os == 'Linux'
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*' -not -path './docs/*'))
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted (run 'gofmt -w .'):"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./... -v -count=1

      - name: Run benchmarks with profiling (auto-detect)
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
        run: |
          mkdir -p /tmp/profiles
          packages=$(go list ./...)

          for pkg in $packages; do
            # Check whether the package has any benchmarks
            if go test -run='^$' -bench=. "$pkg" -benchtime=1x 2>/dev/null | grep -q 'Benchmark'; then
              name=$(basename "$pkg")
              echo "Running benchmarks for $pkg"
              go test "$pkg" \
                -run='^$' \
                -bench=. \
                -benchmem \
                -benchtime=5s \
                -cpuprofile="/tmp/profiles/${name}_cpu.prof" \
                -memprofile="/tmp/profiles/${name}_mem.prof" \
                -count=1
            else
              echo "No benchmarks found in $pkg — skipping"
            fi
          done

      - name: Upload benchmark profiles
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-profiles
          path: /tmp/profiles/
          if-no-files-found: ignore
          retention-days: 7
