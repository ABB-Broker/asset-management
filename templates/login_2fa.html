<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2FA Verification — Asset Management</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="/css/login_2fa.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-box">
        <div class="login-header">
          <div class="logo"><i class="fa fa-shield"></i></div>
          <h2>Two-Factor Verification</h2>
          <p>Signed in as <strong>{{.Username}}</strong></p>
        </div>
        <div class="login-form">
          {{if .Error}}
          <div class="alert alert-danger">
            <i class="fa fa-exclamation-circle"></i> {{.Error}}
          </div>
          {{end}}
          <div class="info-box">
            <i class="fa fa-info-circle"></i>
            Open your authenticator app and enter the 6-digit TOTP code.<br />
            Demo secret: <code>{{.TotpSecret}}</code>
          </div>
          <form method="post" action="/login/2fa">
            <div class="form-group">
              <label>6-Digit Code</label>
              <input
                class="form-control"
                type="text"
                name="code"
                maxlength="6"
                pattern="[0-9]{6}"
                placeholder="000000"
                required
                autofocus
                autocomplete="one-time-code"
              />
            </div>
            <button class="btn-login" type="submit">
              <i class="fa fa-check"></i> Verify &amp; Login
            </button>
          </form>
        </div>
        <div class="login-footer">
          <a href="/login"><i class="fa fa-arrow-left"></i> Back to Login</a>
        </div>
      </div>
    </div>
  </body>
</html>
