<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2FA Verification — Asset Management</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />
  <style>
    *,*:before,*:after{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:#2A3F54}
    .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-box{background:#fff;border-radius:6px;box-shadow:0 6px 30px rgba(0,0,0,.35);width:100%;max-width:380px;overflow:hidden}
    .login-header{background:#2C4E72;padding:22px 20px 16px;text-align:center;color:#fff}
    .login-header .logo{font-size:38px;margin-bottom:6px;color:#1ABB9C}
    .login-header h2{margin:0;font-size:20px;font-weight:300}
    .login-header p{margin:5px 0 0;font-size:12px;opacity:.8}
    .login-form{padding:22px 25px 16px}
    .login-form .form-group{margin-bottom:14px}
    .login-form label{font-weight:600;font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.4px}
    .login-form .form-control{height:38px;border-radius:3px;border-color:#D9DEE4;font-size:18px;text-align:center;letter-spacing:.2em}
    .login-form .form-control:focus{border-color:#1ABB9C;box-shadow:0 0 0 3px rgba(26,187,156,.15);outline:none}
    .btn-login{background:#1ABB9C;border:none;border-radius:3px;color:#fff;font-size:14px;font-weight:600;width:100%;height:40px;cursor:pointer;transition:background .15s}
    .btn-login:hover{background:#18a789}
    .info-box{background:#f0f9f7;border:1px solid #b2dfdb;border-radius:3px;padding:10px 14px;font-size:12px;color:#555;margin-bottom:14px}
    .info-box code{background:transparent;font-size:13px;color:#1ABB9C;font-weight:700}
    .login-footer{text-align:center;padding:0 25px 18px}
    .login-footer a{color:#1ABB9C;font-size:12px;text-decoration:none}
    .login-footer a:hover{text-decoration:underline}
    .alert{border-radius:3px;font-size:13px;margin-bottom:14px;padding:10px 14px}
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-header">
      <div class="logo"><i class="fa fa-shield"></i></div>
      <h2>Two-Factor Verification</h2>
      <p>Signed in as <strong>{{.Username}}</strong></p>
    </div>
    <div class="login-form">
      {{if .Error}}<div class="alert alert-danger"><i class="fa fa-exclamation-circle"></i> {{.Error}}</div>{{end}}
      <div class="info-box">
        <i class="fa fa-info-circle"></i>
        Open your authenticator app and enter the 6-digit TOTP code.<br />
        Demo secret: <code>{{.TotpSecret}}</code>
      </div>
      <form method="post" action="/login/2fa">
        <div class="form-group">
          <label>6-Digit Code</label>
          <input class="form-control" type="text" name="code" maxlength="6" pattern="[0-9]{6}"
                 placeholder="000000" required autofocus autocomplete="one-time-code" />
        </div>
        <button class="btn-login" type="submit"><i class="fa fa-check"></i> Verify &amp; Login</button>
      </form>
    </div>
    <div class="login-footer">
      <a href="/login"><i class="fa fa-arrow-left"></i> Back to Login</a>
    </div>
  </div>
</div>
</body>
</html>
