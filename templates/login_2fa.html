<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
</head>
<body style="background:#f5f7fb;">
<div class="container" style="max-width:520px;margin-top:8vh;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h3>Two-Factor Verification</h3>
      {{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}
      <p class="text-muted mb-2">Use your authenticator app to generate a 6-digit TOTP code.</p>
      <p class="small">Demo secret (configure <code>TOTP_SECRET</code> in production): <strong>{{.TotpSecret}}</strong></p>
      <form method="post" action="/login/2fa">
        <label class="form-label">2FA Code</label>
        <input class="form-control mb-3" name="code" maxlength="6" required />
        <button class="btn btn-primary w-100" type="submit">Login</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
