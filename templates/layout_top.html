{{define "layout_top"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/metismenu@3.0.7/dist/metisMenu.min.css" />
  <style>
    body{background:#f5f7fb;}
    .sidebar{width:240px;min-height:100vh;background:#2f4050;color:#fff;position:fixed;padding-top:1rem;}
    .sidebar a{color:#d7dde4;text-decoration:none;display:block;padding:.6rem 1rem;}
    .sidebar a.active,.sidebar a:hover{background:#3a4d60;color:#fff;}
    .content{margin-left:240px;padding:1.5rem;}
    .metis-brand{padding:0 1rem 1rem;font-weight:700;letter-spacing:.3px;color:#fff;}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="metis-brand">Metis Asset Admin</div>
    <ul id="menu" class="metismenu list-unstyled">
      <li><a class="{{if eq .CurrentPath "/categories"}}active{{end}}" href="/categories">Category Master</a></li>
      <li><a class="{{if eq .CurrentPath "/assets"}}active{{end}}" href="/assets">Asset Master</a></li>
      <li><a href="/logout">Logout</a></li>
    </ul>
  </aside>
  <main class="content">
    {{if .Message}}<div class="alert alert-success">{{.Message}}</div>{{end}}
    {{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}
{{end}}
