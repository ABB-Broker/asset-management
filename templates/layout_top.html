{{define "layout_top"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}} — Asset Management</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />
  <style>
    /* ── Gentelella Admin Template — core layout ── */
    *,*:before,*:after{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:13px;color:#73879C;background:#f7f7f7}

    /* Sidebar */
    .left_col{position:fixed;top:0;bottom:0;left:0;width:230px;background:#2A3F54;overflow-y:auto;z-index:1000}
    .nav_title{padding:15px 15px 12px;border-bottom:1px solid #2C4E72}
    .nav_title .site_title{color:#ECF0F1;font-size:15px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
    .nav_title .site_title:hover{color:#1ABB9C}
    .nav_title .site_title i{color:#1ABB9C;font-size:20px}
    .profile{padding:10px 15px;background:#1F3446;border-bottom:1px solid #2C4E72;overflow:hidden}
    .profile .profile_info{display:inline-block;vertical-align:middle;margin-left:8px;color:#fff}
    .profile .profile_info span{display:block;font-size:11px;color:#9aafc4}
    .profile .profile_info strong{font-size:13px}
    .profile .fa-user-circle{font-size:32px;color:#9aafc4;vertical-align:middle}
    .main_menu{padding:5px 0}
    .menu_section>h3{color:#7F90A4;font-size:10px;text-transform:uppercase;letter-spacing:.6px;padding:10px 15px 5px;margin:0;font-weight:700}
    .nav.side-menu{padding:0;list-style:none;margin:0}
    .nav.side-menu li{border-bottom:1px solid #2C4E72}
    .nav.side-menu li a{color:#E7E7E7;padding:12px 15px;display:block;text-decoration:none;font-size:13px;transition:background .15s}
    .nav.side-menu li a i{margin-right:10px;width:16px;text-align:center;color:#9aafc4}
    .nav.side-menu li a:hover,.nav.side-menu li.current-page>a{background:#1ABB9C;color:#fff}
    .nav.side-menu li a:hover i,.nav.side-menu li.current-page>a i{color:#fff}

    /* Top navbar */
    .top_nav{position:fixed;top:0;left:230px;right:0;z-index:999;background:#EDEDED;border-bottom:1px solid #D9DEE4;min-height:50px}
    .top_nav .nav_menu nav{display:flex;align-items:center;justify-content:space-between;padding:0 15px;height:50px}
    .nav.toggle{cursor:pointer;font-size:18px;color:#555;line-height:50px}
    .nav.toggle:hover{color:#1ABB9C}
    .top_right{display:flex;align-items:center;gap:16px;font-size:13px}
    .top_right a{color:#555;text-decoration:none}
    .top_right a:hover{color:#1ABB9C}
    .top_right .username{color:#333;font-weight:600}

    /* Content area */
    .right_col{margin-left:230px;margin-top:50px;padding:20px;min-height:calc(100vh - 90px)}
    .page-title{padding-bottom:10px;margin-bottom:20px;border-bottom:2px solid #D9DEE4;overflow:hidden}
    .page-title h3{margin:0;font-size:20px;color:#333;font-weight:300;float:left}
    .page-title .breadcrumb{background:transparent;margin:0;padding:4px 0;float:right;font-size:12px}
    .page-title .breadcrumb>li+li:before{color:#aaa}

    /* x_panel (Gentelella card) */
    .x_panel{background:#fff;border:1px solid #D9DEE4;border-radius:4px;margin-bottom:20px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .x_title{padding:10px 15px;border-bottom:1px solid #D9DEE4;overflow:hidden}
    .x_title h2{margin:0;font-size:15px;color:#333;float:left;line-height:1.8}
    .x_title h2 small{color:#999;font-size:12px;margin-left:6px}
    .x_content{padding:15px}
    .x_content.no-pad{padding:0}

    /* Table tweaks for Gentelella */
    .table thead>tr>th{background:#FAFAFA;font-weight:600;color:#333;border-bottom:2px solid #D9DEE4;font-size:13px}
    .table>tbody>tr>td{vertical-align:middle}
    .table.table-bordered{border:1px solid #D9DEE4}
    .table.table-bordered>thead>tr>th,.table.table-bordered>tbody>tr>td{border-color:#E4E9EE}

    /* Form tweaks */
    .form-control{border-radius:3px;border-color:#D9DEE4;font-size:13px;height:34px}
    .form-control:focus{border-color:#1ABB9C;box-shadow:inset 0 1px 1px rgba(0,0,0,.075),0 0 4px rgba(26,187,156,.4)}
    .btn-primary{background:#1ABB9C;border-color:#18a789}
    .btn-primary:hover,.btn-primary:focus{background:#18a789;border-color:#169577}
    .btn-danger{background:#e74c3c;border-color:#c0392b}
    select.form-control{height:34px;padding:5px 10px}

    /* Alerts */
    .alert{border-radius:3px;font-size:13px}

    /* Footer */
    footer{background:#fff;padding:12px 20px;color:#aaa;border-top:1px solid #D9DEE4;font-size:12px;margin-left:230px}
  </style>
</head>
<body>
  <!-- Left sidebar -->
  <div class="left_col">
    <div class="nav_title">
      <a href="/categories" class="site_title"><i class="fa fa-cubes"></i> Asset Admin</a>
    </div>
    <div class="profile">
      <i class="fa fa-user-circle"></i>
      <div class="profile_info">
        <strong>Administrator</strong>
        <span>Asset Management</span>
      </div>
    </div>
    <div class="main_menu">
      <div class="menu_section">
        <h3>Master Data</h3>
        <ul class="nav side-menu">
          <li class="{{if eq .CurrentPath "/categories"}}current-page{{end}}">
            <a href="/categories"><i class="fa fa-tags"></i> Category Master</a>
          </li>
          <li class="{{if eq .CurrentPath "/assets"}}current-page{{end}}">
            <a href="/assets"><i class="fa fa-archive"></i> Asset Master</a>
          </li>
        </ul>
      </div>
      <div class="menu_section">
        <h3>Account</h3>
        <ul class="nav side-menu">
          <li>
            <a href="/logout"><i class="fa fa-sign-out"></i> Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
  <!-- /Left sidebar -->

  <!-- Top navigation -->
  <div class="top_nav">
    <div class="nav_menu">
      <nav>
        <span class="nav toggle"><i class="fa fa-bars"></i></span>
        <div class="top_right">
          <span class="username"><i class="fa fa-user-o" style="margin-right:4px"></i>Admin</span>
          <a href="/logout"><i class="fa fa-power-off"></i> Logout</a>
        </div>
      </nav>
    </div>
  </div>
  <!-- /Top navigation -->

  <!-- Page content -->
  <div class="right_col" role="main">
    {{if .Message}}<div class="alert alert-success"><i class="fa fa-check-circle"></i> {{.Message}}</div>{{end}}
    {{if .Error}}<div class="alert alert-danger"><i class="fa fa-exclamation-triangle"></i> {{.Error}}</div>{{end}}
{{end}}
