{{template "layout_public_top" .}}
<div class="d-flex justify-content-center mt-5">
  <div class="card border-0 shadow-sm rounded-3 text-center p-5" style="max-width:480px">
    {{if eq .Status "approved"}}
      <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
      <h5 class="fw-bold">Already Approved</h5>
      <p class="text-muted">This borrow request has already been approved. The borrower's receipt has been issued.</p>
    {{else}}
      <i class="bi bi-x-circle-fill text-danger fs-1 mb-3"></i>
      <h5 class="fw-bold">Already Rejected</h5>
      <p class="text-muted">This borrow request has already been rejected.</p>
    {{end}}
  </div>
</div>
{{template "layout_public_bottom" .}}
