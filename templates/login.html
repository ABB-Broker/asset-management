<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Asset Management</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />
  <style>
    *,*:before,*:after{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;background:#2A3F54}
    .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-box{background:#fff;border-radius:6px;box-shadow:0 6px 30px rgba(0,0,0,.35);width:100%;max-width:360px;overflow:hidden}
    .login-header{background:#1ABB9C;padding:24px 20px 18px;text-align:center;color:#fff}
    .login-header .logo{font-size:42px;margin-bottom:6px}
    .login-header h2{margin:0;font-size:22px;font-weight:300;letter-spacing:.3px}
    .login-header p{margin:5px 0 0;font-size:12px;opacity:.85}
    .login-form{padding:24px 25px 18px}
    .login-form .form-group{margin-bottom:14px}
    .login-form label{font-weight:600;font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.4px}
    .login-form .form-control{height:38px;border-radius:3px;border-color:#D9DEE4;font-size:14px}
    .login-form .form-control:focus{border-color:#1ABB9C;box-shadow:0 0 0 3px rgba(26,187,156,.15);outline:none}
    .login-form .input-icon{position:relative}
    .login-form .input-icon i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;font-size:14px}
    .login-form .input-icon .form-control{padding-left:32px}
    .btn-login{background:#1ABB9C;border:none;border-radius:3px;color:#fff;font-size:14px;font-weight:600;width:100%;height:40px;cursor:pointer;transition:background .15s}
    .btn-login:hover{background:#18a789}
    .login-footer{text-align:center;padding:0 25px 20px;color:#aaa;font-size:11px}
    .alert{border-radius:3px;font-size:13px;margin-bottom:15px;padding:10px 14px}
  </style>
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-header">
      <div class="logo"><i class="fa fa-cubes"></i></div>
      <h2>Asset Management</h2>
      <p>Sign in to your administrator account</p>
    </div>
    <div class="login-form">
      {{if .Error}}<div class="alert alert-danger"><i class="fa fa-exclamation-circle"></i> {{.Error}}</div>{{end}}
      <form method="post" action="/login">
        <div class="form-group">
          <label>Username</label>
          <div class="input-icon">
            <i class="fa fa-user"></i>
            <input class="form-control" type="text" name="username" placeholder="Enter username" required autofocus />
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-icon">
            <i class="fa fa-lock"></i>
            <input class="form-control" type="password" name="password" placeholder="Enter password" required />
          </div>
        </div>
        <button class="btn-login" type="submit"><i class="fa fa-sign-in"></i> Continue to 2FA</button>
      </form>
    </div>
    <div class="login-footer">Asset Management Admin Panel</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
</body>
</html>
