<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/metismenu@3.0.7/dist/metisMenu.min.css" />
  <style>
    body {background:#f5f7fb;}
    .login-card{max-width:420px;margin:8vh auto;padding:2rem;border-radius:12px;background:#fff;box-shadow:0 10px 25px rgba(0,0,0,.08)}
  </style>
</head>
<body>
<div class="container">
  <div class="login-card">
    <h3 class="mb-3">Asset Management Login</h3>
    {{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control" name="username" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required />
      </div>
      <button class="btn btn-primary w-100" type="submit">Continue to 2FA</button>
    </form>
  </div>
</div>
</body>
</html>
