{{define "layout_bottom"}}
  </main><!-- /main-content -->

  <footer id="main-footer" class="py-3 px-4 border-top bg-white small text-muted">
    <div class="d-flex justify-content-between align-items-center">
      <span>Information Systems Asset Management &copy; 2026</span>
      <span class="text-secondary" style="font-size:.7rem;">Powered by Fiber &amp; Go</span>
    </div>
  </footer>

  <!-- Overlay for mobile sidebar -->
  <div id="sidebarOverlay" class="d-none position-fixed top-0 start-0 w-100 h-100"
       style="background:rgba(0,0,0,.4);z-index:1035;"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const toggleBtn = document.getElementById('sidebarToggle');
    const sidebar   = document.getElementById('sidebar');
    const overlay   = document.getElementById('sidebarOverlay');

    function openSidebar() {
      sidebar.classList.add('show');
      overlay.classList.remove('d-none');
      document.body.style.overflow = 'hidden';
    }
    function closeSidebar() {
      sidebar.classList.remove('show');
      overlay.classList.add('d-none');
      document.body.style.overflow = '';
    }

    if (toggleBtn && sidebar) {
      toggleBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        sidebar.classList.contains('show') ? closeSidebar() : openSidebar();
      });
      overlay.addEventListener('click', closeSidebar);
      // Close on nav link tap (mobile UX)
      sidebar.querySelectorAll('a.nav-link').forEach(link => {
        link.addEventListener('click', () => {
          if (window.innerWidth < 992) closeSidebar();
        });
      });
    }
  </script>
</body>
</html>
{{end}}
