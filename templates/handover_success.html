{{template "layout_top" .}}
<div class="d-flex justify-content-center mt-5">
  <div
    class="card border-0 shadow-sm rounded-3 text-center p-5"
    style="max-width: 480px"
  >
    <i class="bi bi-check-circle-fill text-success fs-1 mb-3"></i>
    <h5 class="fw-bold">Signed Successfully</h5>
    <p class="text-muted">
      Thank you, <strong>{{.Assignee.FullName}}</strong>. Your signature for
      <strong>{{.Asset.Name}}</strong> has been recorded. A Handover Receipt
      will be sent to your email shortly.
    </p>
  </div>
</div>
{{template "layout_bottom" .}}
