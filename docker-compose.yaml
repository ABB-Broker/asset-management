services:
  asset-management:
    build:
      context: .
    container_name: asset-management
    ports:
      - "2005:2005"
    environment:
      - TZ=Asia/Jakarta
      # Override config.yaml values via env vars (Viper supports this automatically).
      # Uncomment and set any value you want to inject at runtime without touching config.yaml.
      # - APP_ENV=production
      # - DB_HOST=your-db-host
      # - DB_PASSWORD=your-db-password
      # - ADMIN_PASSWORD=your-admin-password
    restart: always
    networks:
      - assetMgmtNet
    volumes:
      # Persist logs and uploads across container restarts
      - ${WORKDIR:-./data}/logs:/app/logs
      - ${WORKDIR:-./data}/uploads:/app/uploads
      # Optional: mount config.yaml externally so you can change it without rebuilding
      # - ./config.yaml:/app/config.yaml:ro

networks:
  assetMgmtNet:
    external: true
